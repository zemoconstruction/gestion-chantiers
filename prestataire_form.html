{% extends "base.html" %}
{% block title %}{{ 'Modifier' if p else 'Nouveau' }} prestataire{% endblock %}
{% block content %}
<div class="page-head">
  <h1>{{ 'Modifier le prestataire' if p else 'Nouveau prestataire' }}</h1>
</div>
<div class="card">
  <form method="post">
    <div class="form-grid">
      <div class="field">
        <label>Nom complet *</label>
        <input type="text" name="nom" required value="{{ p.nom if p else '' }}">
      </div>
      <div class="field">
        <label>Téléphone</label>
        <input type="text" name="telephone" value="{{ p.telephone if p else '' }}">
      </div>
      <div class="field">
        <label>Spécialité / Corps de métier</label>
        <input type="text" name="specialite" value="{{ p.specialite if p else '' }}" placeholder="Maçon, Électricien, Plombier...">
      </div>
      <div class="field">
        <label>Chantier</label>
        <select name="chantier_id">
          <option value="">—</option>
          {% for c in chantiers %}
          <option value="{{ c.id }}" {{ 'selected' if p and p.chantier_id==c.id }}>{{ c.nom }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field full">
        <label>Travaux à exécuter</label>
        <textarea name="travaux" rows="2">{{ p.travaux if p else '' }}</textarea>
      </div>
      <div class="field">
        <label>Montant du contrat (F) *</label>
        <input type="number" step="0.01" name="montant_contrat" required value="{{ p.montant_contrat if p else 0 }}">
      </div>
      <div class="field">
        <label>Statut</label>
        <select name="statut">
          {% for s in ['En cours','Terminé','Suspendu'] %}
          <option value="{{ s }}" {{ 'selected' if p and p.statut==s }}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label>Date de début</label>
        <input type="date" name="date_debut" value="{{ p.date_debut if p else '' }}">
      </div>
      <div class="field">
        <label>Date de fin prévue</label>
        <input type="date" name="date_fin_prevue" value="{{ p.date_fin_prevue if p else '' }}">
      </div>
      {% if p %}
      <div class="field">
        <label>Date de fin réelle</label>
        <input type="date" name="date_fin_reelle" value="{{ p.date_fin_reelle or '' }}">
      </div>
      {% endif %}
      <div class="field full">
        <label>Notes</label>
        <textarea name="notes" rows="2">{{ p.notes if p else '' }}</textarea>
      </div>
    </div>
    <div style="margin-top:20px; display:flex; gap:10px;">
      <button class="btn" type="submit">Enregistrer</button>
      <a class="btn secondary" href="{{ url_for('prestataires_list') }}">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
