services:
  - type: web
    name: gestion-chantiers
    runtime: python
    plan: starter
    region: frankfurt
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 60
    envVars:
      - key: DATA_DIR
        value: /data
      - key: SECRET_KEY
        generateValue: true
      - key: PYTHON_VERSION
        value: "3.11"
    disk:
      name: gestion-chantiers-data
      mountPath: /data
      sizeGB: 1
